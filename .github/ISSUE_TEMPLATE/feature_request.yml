name: 功能请求
description: 提出新的功能建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: background
    attributes:
      label: 背景与问题
      description: 你希望解决什么问题？
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 你建议怎么实现？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 是否考虑过其他方案？

  - type: textarea
    id: impact
    attributes:
      label: 预期收益
      description: 该功能会如何帮助用户/运维/排查效率？
